services:
  postgres:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - source_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydatabase"]
      interval: 2s
      timeout: 5s
      retries: 30

  init-db:
    image: postgres:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: mypassword
    volumes:
      - ./init-db.sh:/init-db.sh:ro
      - ./init.sql:/init.sql:ro
    entrypoint: ["sh", "/init-db.sh"]
    restart: "no"

  sender:
    build:
      context: .
      dockerfile: main.DOCKERFILE
    restart: always
    depends_on:
      init-db:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: mydatabase
      DB_USER: myuser
      DB_PASSWORD: mypassword
    ports:
      - "5000:5000"
    command: ["python", "main.py"]

volumes:
  source_postgres_data:
