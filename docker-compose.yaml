services:
  postgres:
    image: postgres:latest
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - source_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 2s
      timeout: 5s
      retries: 30
    networks:
      - db

  init-db:
    image: postgres:latest
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.05"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    volumes:
      - ./init-db.sh:/init-db.sh:ro
      - ./init.sql:/seed.sql:ro
    entrypoint: ["sh", "/init-db.sh"]
    restart: "no"
    networks:
      - db

  sender:
    build:
      context: .
      dockerfile: main.DOCKERFILE
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
    depends_on:
      init-db:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      API_KEY: ${API_KEY}
    ports:
      - "5000:5000"
    command: ["python", "main.py"]
    networks:
      - frontend
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.2"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx:rw
    depends_on:
      sender:
        condition: service_started
    networks:
      - frontend

volumes:
  source_postgres_data:

networks:
  frontend:
  backend:
  db: